<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Serverless Workflow ESM Example</title>
    <base href="/" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
  </head>

  <body>
    <pre id="output"></pre>
    <script type="module">
      import { Classes } from '../../dist/index.mjs';

      (() => {
        const { Workflow } = Classes;
        const myJsonWorkflow = `{
        "document": {
          "dsl": "1.0.0",
          "name": "using-json",
          "version": "1.0.0",
          "namespace": "default"
        },
        "do": [
          {
            "step1": {
              "set": {
                "variable": "my first workflow"
              }
            }
          }
        ]
      }`;
        const workflow = Workflow.deserialize(myJsonWorkflow);
        document.getElementById('output').innerHTML =
          `--- YAML ---\n${workflow.serialize()}\n\n--- JSON ---\n${workflow.serialize('json')}`;
      })();
    </script>
  </body>
</html>
