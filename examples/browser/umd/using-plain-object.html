<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Serverless Workflow UMD Example</title>
    <base href="/" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
  </head>

  <body>
    <pre id="output"></pre>
    <script src="../../../dist/index.umd.js"></script>
    <script>
      (() => {
        const { Classes, validate } = globalThis.serverWorkflowSdk;
        const workflowDefinition = {
          document: {
            dsl: '1.0.0',
            name: 'using-plain-object',
            version: '1.0.0',
            namespace: 'default',
          },
          do: [
            {
              step1: {
                set: {
                  variable: 'my first workflow',
                },
              },
            },
          ],
        };
        try {
          validate('Workflow', workflowDefinition);
          document.getElementById('output').innerHTML =
            `--- YAML ---\n${Classes.Workflow.serialize(workflowDefinition)}\n\n--- JSON ---\n${Classes.Workflow.serialize(workflowDefinition, 'json')}`;
        } catch (ex) {
          console.error('Invalid workflow', ex);
        }
      })();
    </script>
  </body>
</html>
